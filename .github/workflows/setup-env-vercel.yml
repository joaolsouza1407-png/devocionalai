name: Configurar Variaveis na Vercel

on:
  workflow_dispatch:
    inputs:
      openai_key:
        description: 'OPENAI_API_KEY (sua chave sk-...)'
        required: true
      zapi_instance:
        description: 'ZAPI_INSTANCE_ID'
        required: true
      zapi_token:
        description: 'ZAPI_TOKEN'
        required: true
      zapi_client_token:
        description: 'ZAPI_CLIENT_TOKEN'
        required: true

jobs:
  setup-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Criar arquivo de link do projeto Vercel
        run: |
          mkdir -p .vercel
          echo '{
            "projectId": "JppMs0YHMiD2VD1P1HDSxDKQu16",
            "orgId": "team_ufmPDNKNzrJehGbaKHioQG7p"
          }' > .vercel/project.json
          cat .vercel/project.json

      - name: Adicionar variaveis de ambiente via Vercel CLI
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          add_var() {
            echo "$2" | vercel env add "$1" production --token=$VERCEL_TOKEN --yes 2>&1 | tail -3
          }
          
          echo "=== Configurando variaveis ==="
          add_var SUPABASE_URL "${{ secrets.SUPABASE_URL }}"
          add_var SUPABASE_KEY "${{ secrets.SUPABASE_KEY }}"
          add_var OPENAI_API_KEY "${{ github.event.inputs.openai_key }}"
          add_var WEBHOOK_SECRET "devo2026secret"
          add_var CRON_SECRET "cron2026secret"
          add_var ZAPI_INSTANCE_ID "${{ github.event.inputs.zapi_instance }}"
          add_var ZAPI_TOKEN "${{ github.event.inputs.zapi_token }}"
          add_var ZAPI_CLIENT_TOKEN "${{ github.event.inputs.zapi_client_token }}"
          echo "=== Concluido! ==="

      - name: Redeploy na Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel --prod --token=$VERCEL_TOKEN --yes 2>&1 | tail -5
