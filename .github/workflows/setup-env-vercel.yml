name: Configurar Variaveis na Vercel

on:
  workflow_dispatch:
    inputs:
      openai_key:
        description: 'OPENAI_API_KEY (sua chave sk-...)'
        required: true
      zapi_instance:
        description: 'ZAPI_INSTANCE_ID'
        required: true
      zapi_token:
        description: 'ZAPI_TOKEN'
        required: true
      zapi_client_token:
        description: 'ZAPI_CLIENT_TOKEN'
        required: true

jobs:
  setup-env:
    runs-on: ubuntu-latest
    steps:
      - name: Configurar variaveis via Vercel REST API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Busca o ID do projeto pelo nome (funciona com contas pessoais e times)
          echo "=== Buscando projeto na Vercel ==="
          PROJECT_RESPONSE=$(curl -s "https://api.vercel.com/v9/projects/devocionalai" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}")
          echo "Resposta: ${PROJECT_RESPONSE:0:200}"
          
          PROJECT_ID=$(echo $PROJECT_RESPONSE | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "Project ID encontrado: $PROJECT_ID"
          
          if [ -z "$PROJECT_ID" ]; then
            echo "ERRO: Projeto nao encontrado. Verifique o VERCEL_TOKEN."
            exit 1
          fi
          
          set_env_var() {
            local key=$1
            local value=$2
            RESULT=$(curl -s -X POST "https://api.vercel.com/v10/projects/${PROJECT_ID}/env" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"key\": \"${key}\",
                \"value\": \"${value}\",
                \"type\": \"encrypted\",
                \"target\": [\"production\"]
              }")
            echo "[$key] ${RESULT:0:100}"
          }

          echo "=== Configurando variaveis de ambiente ==="
          set_env_var "SUPABASE_URL" "${{ secrets.SUPABASE_URL }}"
          set_env_var "SUPABASE_KEY" "${{ secrets.SUPABASE_KEY }}"
          set_env_var "OPENAI_API_KEY" "${{ github.event.inputs.openai_key }}"
          set_env_var "WEBHOOK_SECRET" "devo2026secret"
          set_env_var "CRON_SECRET" "cron2026secret"
          set_env_var "ZAPI_INSTANCE_ID" "${{ github.event.inputs.zapi_instance }}"
          set_env_var "ZAPI_TOKEN" "${{ github.event.inputs.zapi_token }}"
          set_env_var "ZAPI_CLIENT_TOKEN" "${{ github.event.inputs.zapi_client_token }}"
          echo "=== Concluido! ==="

      - name: Acionar redeploy na Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          RESPONSE=$(curl -s "https://api.vercel.com/v9/projects/devocionalai" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}")
          PROJECT_ID=$(echo $RESPONSE | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          
          curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "devocionalai",
              "gitSource": {
                "type": "github",
                "repoId": "1226159010",
                "ref": "main"
              },
              "target": "production"
            }' | head -c 300
          echo ""
          echo "=== Redeploy acionado! ==="
