name: Configurar Variaveis na Vercel

on:
  workflow_dispatch:

  jobs:
    setup-env:
        runs-on: ubuntu-latest
            steps:
                  - name: Adicionar variaveis via REST API
                          run: |
                                    TOKEN="${{ secrets.VERCEL_TOKEN }}"
                                              TEAM_SLUG="joaolsouza1407-pngs-projects"
                                                        PROJECT_NAME="devocionalai"

                                                                  add_env_var() {
                                                                              local key="$1"
                                                                                          local value="$2"
                                                                                                      echo "Adicionando: $key"
                                                                                                                  RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
                                                                                                                                "https://api.vercel.com/v10/projects/${PROJECT_NAME}/env?teamId=${TEAM_SLUG}" \
                                                                                                                                              -H "Authorization: Bearer ${TOKEN}" \
                                                                                                                                                            -H "Content-Type: application/json" \
                                                                                                                                                                          -d "{\"key\":\"${key}\",\"value\":\"${value}\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\",\"development\"]}")
                                                                                                                                                                                      HTTP_CODE=$(echo "$RESPONSE" | tail -1)
                                                                                                                                                                                                  BODY=$(echo "$RESPONSE" | head -1)
                                                                                                                                                                                                              echo "Status: $HTTP_CODE"
                                                                                                                                                                                                                          echo "Response: $BODY"
                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                    
